version: 2
updates:
  # Keep GitHub Actions SHA pins fresh. Dependabot updates the SHA AND the
  # version comment when a new release lands.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    groups:
      actions:
        patterns: ["*"]
    commit-message:
      prefix: "ci"

  # npm ecosystem covers the pnpm-lock.yaml file too.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
      semver-major-days: 14
    open-pull-requests-limit: 5
    groups:
      production-minor-patch:
        dependency-type: "production"
        update-types: ["minor", "patch"]
      development-minor-patch:
        dependency-type: "development"
        update-types: ["minor", "patch"]
    commit-message:
      prefix: "deps"
      prefix-development: "deps-dev"
