name: Build and Deploy to IPFS

on:
  release:
    types: [published]
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d  # v6.0.5
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build static site
        run: pnpm run build

      - name: Deploy to Pinata
        id: pinata
        uses: aave/pinata-action@35662944e92cf082457973f10aa42e48df179b47  # pinned
        with:
          PINATA_API_KEY: ${{ secrets.PINATA_API_KEY }}
          PINATA_SECRET_KEY: ${{ secrets.PINATA_SECRET_KEY }}
          PIN_ALIAS: "erc8213-${{ github.ref_name }}"
          BUILD_LOCATION: "./out"
          CID_VERSION: 1

      - name: Output IPFS CID
        run: |
          echo "::notice title=IPFS Deployment::Successfully deployed to IPFS"
          echo "::notice title=IPFS CID::${{ steps.pinata.outputs.hash }}"
          echo "::notice title=IPFS Gateway::${{ steps.pinata.outputs.uri }}"
